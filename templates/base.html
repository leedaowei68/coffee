<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}☕ 咖啡手冲看板{% endblock %}</title>
<style>
@font-face {
  font-family: 'CoffeeDashboard';
  src: url('/static/fonts/641a999ff0176cfe06f2e4d5aa89f29d.ttf') format('truetype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'HanyiSentyZhao';
  src: url('/static/fonts/HanyiSentyZhao.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'HanyiSentySpringBrush';
  src: url('/static/fonts/HanyiSentySpringBrush.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
:root {
  --bg: #f3efe4;
  --surface: rgba(255, 252, 242, .86);
  --surface-solid: #fffaf0;
  --surface2: rgba(222, 211, 190, .58);
  --surface2-solid: #e7ddc9;
  --border: rgba(45, 38, 28, .22);
  --accent: #ef6f1a;
  --accent2: #171410;
  --text: #211d17;
  --text2: #6d6253;
  --green: #2f7a58;
  --red: #b94131;
  --tier-daily: #f97316;
  --tier-daily-soft: rgba(249, 115, 22, .18);
  --tier-daily-text: #c2410c;
  --tier-premium: #ffd400;
  --tier-premium-soft: rgba(255, 212, 0, .30);
  --tier-premium-text: #8a5a00;
  --tier-luxury: #d70000;
  --tier-luxury-soft: rgba(215, 0, 0, .16);
  --tier-luxury-text: #d70000;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #e5dccb; }
body {
  background-color: var(--bg);
  background-image:
    radial-gradient(circle at 13% 18%, rgba(39, 31, 22, .13) 0 1px, transparent 2px),
    radial-gradient(circle at 84% 12%, rgba(49, 42, 32, .10) 0 1px, transparent 2px),
    radial-gradient(circle at 64% 72%, rgba(39, 31, 22, .08) 0 2px, transparent 4px),
    radial-gradient(ellipse at 18% 88%, rgba(64, 55, 42, .10) 0 4px, transparent 28px),
    radial-gradient(ellipse at 74% 32%, rgba(80, 70, 56, .08) 0 5px, transparent 34px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.24) 0 1px, rgba(255,255,255,0) 1px 7px),
    repeating-linear-gradient(90deg, rgba(57, 47, 34, .026) 0 1px, transparent 1px 11px),
    linear-gradient(105deg, transparent 0 47.7%, rgba(58, 49, 38, .10) 48%, transparent 48.25% 100%),
    linear-gradient(180deg, #f8f5ec 0%, #efe8d9 100%);
  background-size:
    360px 360px,
    420px 420px,
    520px 520px,
    640px 520px,
    740px 560px,
    100% 9px,
    13px 100%,
    100% 100%,
    100% 100%;
  background-attachment: fixed;
  color: var(--text);
  font-family: 'CoffeeDashboard', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 22px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
}
body::before {
  z-index: 0;
  opacity: .58;
  mix-blend-mode: multiply;
  background-image:
    radial-gradient(ellipse at 9% 22%, rgba(24, 21, 18, .16) 0 2px, transparent 22px),
    radial-gradient(ellipse at 33% 9%, rgba(34, 28, 22, .10) 0 5px, transparent 42px),
    radial-gradient(ellipse at 87% 76%, rgba(24, 20, 16, .12) 0 3px, transparent 32px),
    radial-gradient(ellipse at 51% 54%, rgba(120, 105, 80, .08) 0 18px, transparent 80px),
    repeating-radial-gradient(circle at 20% 40%, rgba(33, 28, 22, .05) 0 1px, transparent 1px 6px);
  background-size: 520px 420px, 680px 540px, 620px 460px, 900px 700px, 180px 180px;
}
body::after {
  z-index: 0;
  opacity: .28;
  background-image:
    linear-gradient(90deg, transparent 0 49.85%, rgba(37, 31, 24, .18) 49.95%, transparent 50.1% 100%),
    linear-gradient(0deg, transparent 0 50.05%, rgba(69, 58, 43, .13) 50.16%, transparent 50.32% 100%),
    linear-gradient(116deg, transparent 0 42%, rgba(32, 26, 20, .12) 42.08%, transparent 42.5% 100%),
    repeating-linear-gradient(18deg, transparent 0 41px, rgba(33, 28, 22, .045) 42px, transparent 44px);
  background-size: 760px 100%, 100% 610px, 430px 430px, 310px 310px;
}
a { color: var(--accent2); text-decoration: none; }
a:hover { color: var(--text); }

/* nav */
nav {
  background: rgba(246, 241, 229, .9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 10px 24px rgba(31, 25, 18, .08);
  padding: 0 36px;
  display: flex;
  align-items: center;
  gap: 32px;
  height: 68px;
  position: sticky;
  top: 0;
  z-index: 100;
  animation: navSlideDown 0.35s ease both;
}
.nav-brand { font-size: 28px; font-weight: 700; color: var(--accent2); letter-spacing: 1px; line-height: 1; }
.nav-link { color: var(--text2); font-size: 22px; transition: color .2s; }
.nav-link:hover { color: var(--text); }
.nav-cta {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  padding: 10px 26px;
  border-radius: 6px;
  font-size: 22px;
  font-weight: 600;
  transition: background .2s;
}
.nav-cta:hover { background: var(--accent2); color: #fff; }

/* layout */
.container { max-width: 1200px; margin: 0 auto; padding: 36px; position: relative; z-index: 1; }
.page-title { font-size: 44px; font-weight: 700; margin-bottom: 24px; color: var(--accent2); line-height: 1.2; }

/* cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow:
    0 14px 30px rgba(46, 36, 24, .10),
    inset 0 1px 0 rgba(255, 255, 255, .62);
  backdrop-filter: blur(.6px);
}
.card-title {
  font-size: 22px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 20px;
}

/* grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
@media (max-width: 900px) {
  .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-2 { grid-template-columns: 1fr; }
}

/* badge */
.badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 4px;
  font-size: 18px;
  font-weight: 600;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.badge-green { background: #eef3df; color: var(--green); border-color: #b8c99a; }
.badge-amber { background: var(--tier-premium-soft); color: var(--tier-premium-text); border-color: var(--tier-premium); }
.badge-red   { background: #fff0f0; color: #e05555; border-color: #fca5a5; }
.badge-cups  { background: #eef2f6; color: #64748b; border-color: #cbd5e1; }
.tier-badge {
  flex-shrink: 0;
  font-size: 17px;
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 700;
  border: 1px solid var(--border);
}
.tier-badge.tier-daily {
  background: var(--tier-daily-soft);
  color: var(--tier-daily-text);
  border-color: var(--tier-daily);
}
.tier-badge.tier-premium {
  background: var(--tier-premium);
  color: #2b2112;
  border-color: #d9a800;
}
.tier-badge.tier-luxury {
  background: var(--tier-luxury-soft);
  color: var(--tier-luxury-text);
  border-color: var(--tier-luxury);
}

/* brew cards */
.brew-card {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.brew-card:hover {
  border-color: var(--accent);
  box-shadow: 0 12px 26px rgba(90, 52, 20, .16);
}
.brew-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  min-width: 0;
}
.brew-title-link {
  flex: 1;
  min-width: 0;
  max-width: 100%;
  text-decoration: none;
}
.brew-bean-name {
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brew-bean-name.fit-small {
  font-size: 18px;
}
.brew-date {
  color: var(--text2);
  font-size: 20px;
  margin-top: 2px;
}
.brew-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.brew-score {
  min-width: 74px;
  color: var(--accent2);
  font-size: 36px;
  font-weight: 800;
  line-height: .9;
  text-align: right;
}
.brew-meta {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.brew-note {
  margin-top: 10px;
  height: 40px;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-family: inherit;
  font-size: 18px;
  line-height: 22px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  word-break: normal;
}
.more-records-btn {
  align-self: center;
  width: min(260px, 100%);
  text-align: center;
  margin-top: 6px;
}
@media (max-width: 620px) {
  .brew-card-top {
    flex-direction: column;
  }
  .brew-actions {
    width: 100%;
    justify-content: space-between;
  }
  .brew-score {
    font-size: 36px;
    text-align: left;
  }
}

/* stars */
.stars { color: var(--accent); letter-spacing: -1px; }
.stars-empty { color: var(--border); }

/* button */
.btn {
  display: inline-block;
  padding: 12px 28px;
  border-radius: 6px;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .2s;
}
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 3px 0 rgba(29, 22, 15, .18); }
.btn-primary:hover { background: var(--accent2); color: #fff; }
.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
.btn-page-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 20px;
  font-size: 20px;
  line-height: 1.6;
}
.btn.brew-action-btn {
  padding: 7px 16px;
  font-size: 18px;
  line-height: 1.6;
}
.btn.brew-delete-btn {
  background: transparent;
  color: var(--red);
  border: 1px solid #fca5a5;
}

/* form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group.full { grid-column: 1/-1; }
label { font-size: 20px; color: var(--text2); letter-spacing: .5px; }
input, select, textarea {
  background: rgba(255, 252, 242, .72);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 12px 16px;
  font-size: 22px;
  font-family: inherit;
  width: 100%;
  transition: border-color .2s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}
select option { background: var(--surface); }
textarea { resize: vertical; min-height: 100px; }
.section-divider {
  grid-column: 1/-1;
  border: none;
  border-top: 1px solid var(--border);
  margin: 6px 0;
}
.section-label {
  grid-column: 1/-1;
  font-size: 18px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 6px;
}

/* table */
table { width: 100%; border-collapse: collapse; font-size: 22px; }
th {
  text-align: left;
  padding: 14px 16px;
  color: var(--text2);
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: .6px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 16px;
  border-bottom: 1px solid var(--surface2);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

/* inventory bar */
.inv-bar-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; }
.inv-bar { height: 6px; border-radius: 3px; background: var(--accent); transition: width .3s; }
.inv-bar.low { background: var(--red); }
.inv-bar.mid { background: #c8a03a; }
.inv-bar.tier-luxury { background: var(--tier-luxury); }
.inv-bar.tier-premium { background: var(--tier-premium); }
.inv-bar.tier-daily { background: var(--tier-daily); }

/* detail grid */
.detail-row { display: flex; gap: 12px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--surface2); }
.detail-label { color: var(--text2); font-size: 20px; min-width: 150px; flex-shrink: 0; }
.detail-val { color: var(--text); font-size: 22px; }

/* flavor tags */
.flavor-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.flavor-tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 5px 16px;
  font-size: 18px;
  color: var(--text2);
}

/* loading spinner */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Entrance animations ─────────────────────────── */
@keyframes navSlideDown {
  from { opacity: 0; transform: translateY(-100%); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.container {
  animation: fadeSlideUp 0.45s cubic-bezier(.25,.46,.45,.94) 0.1s both;
}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">☕ 手冲看板</span>
  <a class="nav-link" href="/">返回首页</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script>
function fitBrewTitles() {
  document.querySelectorAll('[data-fit-title]').forEach(el => {
    el.classList.remove('fit-small');
    if (el.scrollWidth > el.clientWidth + 1) {
      el.classList.add('fit-small');
    }
  });
}
document.addEventListener('DOMContentLoaded', fitBrewTitles);
window.addEventListener('resize', () => requestAnimationFrame(fitBrewTitles));
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(fitBrewTitles);
}
</script>
</body>
</html>
